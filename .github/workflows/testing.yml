name: Tests para DDM

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build:
    name: Compilar en ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Para que si uno falla, el otro siga corriendo
      matrix:
        os: [ubuntu-latest, windows-latest] # Para que corra en ambos sistemas operativos

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Instalar Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.*' #version estable de qt
        # Condiciones para instalar
        host: ${{ matrix.os == 'windows-latest' && 'windows' || 'linux' }}
        target: 'desktop'
        arch: ${{ matrix.os == 'windows-latest' && 'win64_msvc2019_64' || '' }}

  #el make lee DDM.pro y prepara todo para la compilacion
  
    # --- PASOS ESPECÍFICOS PARA WINDOWS ---
    - name: Configurar MSVC (Solo Windows)
      if: matrix.os == 'windows-latest'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Compilar en Windows
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: |
        qmake DDM.pro -spec win32-msvc
        nmake

    # --- PASOS ESPECÍFICOS PARA LINUX ---
    - name: Compilar en Linux
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir build
        cd build
        qmake ../DDM.pro
        make
