stages:
  - build
  - release

#Compilacion para windows (con las restricciones de versiones)
build_windows:
  stage: build
  tags:
    - ddm-test-pc
  only:
    - develop
    - tags
  script:
    - echo "Compilando versión RELEASE para Windows..."
    - qmake DDM.pro CONFIG+=release
    - nmake
    - windeployqt release\DDM.exe --compiler-runtime
  artifacts:
    name: "DDM-Windows-v$CI_COMMIT_TAG"
    paths:
      - release/

#Compilacion para linux (linux-version)
build_linux:
  stage: build
  image: rabbitmq:latest # Tu imagen con Qt6
  tags:
    - linux-runner
  only:
    - linux-version
    - tags
  script:
    - echo "Compilando versión RELEASE para Linux..."
    - mkdir -p build_linux
    - cd build_linux
    - qmake ../DDM.pro CONFIG+=release
    - make -j$(nproc)
  artifacts:
    name: "DDM-Linux-v$CI_COMMIT_TAG"
    paths:
      - build_linux/

#Generacion de release
create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - ddm-test-pc
  rules:
    - if: $CI_COMMIT_TAG #solo se ejecuta si ejecuto el tag
  script:
    - echo "Creando Release unificada para Windows y Linux..."
  release:
    name: 'DDM Release $CI_COMMIT_TAG'
    description: 'Versión oficial para la ARA. Esta release contiene los binarios optimizados (release) para ambos sistemas operativos.'
    tag_name: '$CI_COMMIT_TAG'
    ref: '$CI_COMMIT_SHA'
    assets:
      links:
        - name: 'Descargar para Windows'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/download?job=build_windows'
        - name: 'Descargar para Linux'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/download?job=build_linux'