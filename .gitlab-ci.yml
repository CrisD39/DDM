variables:
  GIT_CLEAN_FLAGS: -ffdx

stages:
  - build
  - release

#Compilacion en windows, develop
build_windows:
  stage: build
  tags:
    - ddm-test-pc
  only:
    - develop
    - linux-version
    - tags
  script:
    - echo "Compilando versión RELEASE en Windows..."
    - $env:Path = "C:\Qt\6.7.3\mingw_64\bin;C:\Qt\Tools\mingw1120_64\bin;" + $env:Path
    - qmake DDM.pro CONFIG+=release
    - mingw32-make
    - windeployqt release\DDM.exe --compiler-runtime
  artifacts:
    name: "DDM-Windows-v$CI_COMMIT_TAG"
    paths:
      - release/

#Compilacion en linux, linux-version
build_linux:
  stage: build
  image: stateoftheartio/qt6:6.7-gcc-aqt
  tags:
    - ddm-linux-local
  only:
    - develop
    - linux-version
    - tags
  script:
    - echo "Preparando entorno de Linux instalando dependencias gráficas..."
    - sudo apt-get update -qq && sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev
    - echo "Imitando el actions/checkout con ref linux-version..."
    - git config --global --add safe.directory '*'
    - git fetch origin linux-version
    - git checkout linux-version
    
    - echo "Compilando versión RELEASE en Ubuntu..."
    - mkdir -p build_linux
    - cd build_linux
    - qmake ../DDM.pro CONFIG+=release
    - make -j$(nproc)
  artifacts:
    name: "DDM-Linux-v$CI_COMMIT_TAG"
    paths:
      - build_linux/

#Release para windows
release_windows:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - ddm-test-pc
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Generando Release oficial para Windows..."
  release:
    name: 'DDM Windows Release $CI_COMMIT_TAG'
    description: 'Binarios oficiales para Windows (compilados en ddm-test-pc).'
    tag_name: '$CI_COMMIT_TAG-win' # Tag diferenciado
    ref: '$CI_COMMIT_SHA'
    assets:
      links:
        - name: 'Descargar DDM Windows (.exe)'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/download?job=build_windows'

#Release para linux
release_linux:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - ddm-linux-local
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Generando Release oficial para Linux..."
  release:
    name: 'DDM Linux Release $CI_COMMIT_TAG'
    description: 'Binarios oficiales para Linux (compilados en ddm-linux-local).'
    tag_name: '$CI_COMMIT_TAG-linux' # Tag diferenciado
    ref: '$CI_COMMIT_SHA'
    assets:
      links:
        - name: 'Descargar DDM Linux (Ubuntu)'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/download?job=build_linux'