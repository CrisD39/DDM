stages:
  - build
# --- TAREA PARA TU PC (WINDOWS) ---
# Se activa cuando subís cambios y tu Runner está en "run"
build_windows:
  stage: build
  tags:
    - ddm-test-pc
  script:
    - echo "Compilando para Windows en la PC de Maria..."
    # 1. Agregamos Qt al Path para que reconozca qmake
    - $env:Path += ";C:\Qt\6.5.3\msvc2019_64\bin" 
    # 2. Despertamos al compilador de Visual Studio y compilamos en un solo paso
    - cmd.exe /c '"C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" && qmake DDM.pro -spec win32-msvc && nmake'
  artifacts:
    paths:
      - release/DDM.exe
# --- TAREA PARA EL SERVIDOR DE LA ARMADA (LINUX) ---
# Esta tarea la va a buscar el runner "infra"
build_linux:
  stage: build
  # Usamos una imagen oficial y limpia de Ubuntu
  image: ubuntu:22.04
  tags:
    - ddm-linux-local
  before_script:
    # Le decimos a la maquinita Linux que instale Qt6 y los compiladores (C++)
    - apt-get update -y
    - apt-get install -y qt6-base-dev qt6-tools-dev build-essential
  script:
    - echo "Compilando para Linux con Ubuntu en la PC de Maria..."
    # En Ubuntu, qmake para la versión 6 se llama qmake6
    - qmake6 DDM.pro
    - make
  artifacts:
    paths:
      - DDM